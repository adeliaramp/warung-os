name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install tools
        run: pip install ruff black pytest

      - name: ruff
        run: ruff check .

      - name: black
        run: black --check .

      - name: pytest
        run: pytest tests/
