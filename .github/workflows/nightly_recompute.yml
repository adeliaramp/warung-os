name: nightly recompute

# Manual trigger only. To run this on a schedule after adding the four
# repository secrets below, uncomment the schedule block.
# 23:00 WIB = 16:00 UTC.
on:
  workflow_dispatch:
  # schedule:
  #   - cron: "0 16 * * *"

jobs:
  recompute:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      MERCHANT_CHAT_ID: ${{ secrets.MERCHANT_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python jobs/nightly_recompute.py
