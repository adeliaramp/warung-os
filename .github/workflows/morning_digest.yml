name: morning digest

# Manual trigger only. To run this on a schedule after adding the four
# repository secrets below, uncomment the schedule block.
# WIB is UTC+7, so 06:00 WIB = 23:00 UTC previous day.
on:
  workflow_dispatch:
  # schedule:
  #   - cron: "0 23 * * *"

jobs:
  digest:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      MERCHANT_CHAT_ID: ${{ secrets.MERCHANT_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python jobs/morning_digest.py
